name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Navigate to the isolated app directory
            cd /home/appuser/apps
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # 🟢 1. Build & Restart Backend API
            cd backend
            npm install
            # Run with ecosystem awareness
            pm2 reload naijahomemade-api --update-env || pm2 start server.js --name naijahomemade-api
            pm2 save

            # 🟢 2. Build Frontend UI
            cd ../frontend
            npm install
            npm run build

            # 🟢 3. Deploy Production Build to Nginx Root Safely
            # No sudo required! appuser now owns this directory
            rm -rf /var/www/videos/*
            cp -r dist/* /var/www/videos/